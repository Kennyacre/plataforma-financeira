<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trocar Senha - TN INFO</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="css/login.css?v=2">
</head>

<body>

    <div class="login-container wide">
        <div class="login-box">
            <div class="logo">TN INFO</div>
            <div class="subtitle">Segurança da Conta</div>

            <p style="color: #ffffff; font-size: 14px; margin-bottom: 25px; line-height: 1.5;">
                Sua senha foi resetada pelo administrador. Por favor, <strong>defina uma nova senha permanente</strong> para continuar.
            </p>

            <form id="formTrocarSenha">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Nova Senha</label>
                        <div class="input-wrapper">
                            <span class="material-symbols-rounded">lock_reset</span>
                            <input type="password" id="nova_senha" class="form-control" placeholder="Mínimo 6 caracteres" required minlength="6">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Confirmar Nova Senha</label>
                        <div class="input-wrapper">
                            <span class="material-symbols-rounded">check_circle</span>
                            <input type="password" id="confirmar_senha" class="form-control" placeholder="Repita a nova senha" required minlength="6">
                        </div>
                    </div>
                </div>

                <div id="mensagemStatus" class="error-msg"></div>

                <button type="submit" id="btn-submit-troca" class="btn-login">
                    <span>Salvar e Aceder ao Painel</span>
                    <span class="material-symbols-rounded">verified_user</span>
                </button>
            </form>
        </div>
    </div>

    <script>
        const form = document.getElementById('formTrocarSenha');
        const msg = document.getElementById('mensagemStatus');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const nova_senha = document.getElementById('nova_senha').value;
            const confirmar = document.getElementById('confirmar_senha').value;
            const username = localStorage.getItem('temp_username');

            if (!username) {
                location.href = 'index.html';
                return;
            }

            if (nova_senha !== confirmar) {
                msg.style.display = 'flex';
                msg.textContent = 'As senhas não coincidem!';
                return;
            }

            try {
                const res = await fetch('/api/usuarios/trocar-senha', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, nova_senha })
                });

                const data = await res.json();
                if (data.status === 'sucesso') {
                    localStorage.setItem('user_auth', username);
                    // Redireciona conforme o role salvo anteriormente ou apenas para o painel cliente por segurança
                    location.href = 'cliente/painel-cliente.html';
                } else {
                    msg.style.display = 'flex';
                    msg.textContent = data.detail || 'Erro ao trocar senha.';
                }
            } catch (err) {
                msg.style.display = 'flex';
                msg.textContent = 'Erro de conexão com o servidor.';
            }
        });
    </script>
</body>

</html>
