<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TN INFO</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="css/login.css?v=3">

    <!-- PWA Core -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
</head>

<body>

    <div class="login-container">
        <div class="login-box">
            <div class="logo">TN INFO</div>
            <div class="subtitle">Acesse seu painel financeiro</div>

            <form id="formLogin">
                <div class="form-group">
                    <label for="email">Utilizador ou E-mail</label>
                    <div class="input-wrapper">
                        <span class="material-symbols-rounded">person</span>
                        <input type="text" id="email" class="form-control" placeholder="Seu e-mail ou username" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">Senha</label>
                    <div class="input-wrapper">
                        <span class="material-symbols-rounded">lock</span>
                        <input type="password" id="password" class="form-control" placeholder="Sua senha" required>
                    </div>
                </div>

                <div id="mensagemErro" class="error-msg">
                    <span class="material-symbols-rounded">error_outline</span>
                    <span id="error-text">Credenciais inválidas</span>
                </div>

                <button type="submit" id="btn-submit-login" class="btn-login">
                    <span>Entrar no Sistema</span>
                    <span class="material-symbols-rounded">arrow_forward</span>
                </button>

                <div class="links-container">
                    <a href="esqueci-senha.html">Esqueci minha senha</a>
                    <a href="cadastro.html">Criar conta</a>
                </div>

                <div class="register-section">
                    <p>Ainda não tem acesso? <a href="cadastro.html">Registe-se agora</a></p>
                </div>
            </form>
        </div>
    </div>

    <script src="js/login.js?v=3"></script>
</body>

</html>
