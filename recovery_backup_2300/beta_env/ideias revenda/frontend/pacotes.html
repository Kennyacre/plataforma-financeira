<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Pacotes | TN INFO</title>

    <script src="../js/security.js?v=2"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <link rel="stylesheet" href="../cliente/css/dashboard.css?v=1">
    <link rel="stylesheet" href="css/admin.css?v=1">
    <link rel="stylesheet" href="css/pacotes.css?v=1"> </head>
<body>
    <div class="dashboard-wrapper">
        <nav class="sidebar" id="minha-sidebar">
            
            <div class="user-info" style="display: flex; flex-direction: column; align-items: center; padding: 20px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 10px;">
                <img src="../assets/img/logo.jpg" alt="TN INFO" style="width: 140px; height: 140px; border-radius: 12px; object-fit: cover; border: 2px solid rgba(255,255,255,0.1); box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
            </div>
            
            <ul class="nav-links">
                <li onclick="location.href='painel-admin.html'"><span class="material-symbols-rounded">bar_chart</span> Visão Geral</li>
                <li onclick="location.href='todos-clientes.html'"><span class="material-symbols-rounded">group</span> Todos os Clientes</li>
                <li class="separator">FINANCEIRO GLOBAL</li>
                <li class="active" onclick="location.href='pacotes.html'"><span class="material-symbols-rounded">package_2</span> Pacotes de Crédito</li>
                <li onclick="location.href='aprovar-creditos.html'"><span class="material-symbols-rounded">add_card</span> Aprovar Créditos</li>
                <li onclick="location.href='receitas-admin.html'"><span class="material-symbols-rounded">account_balance</span> Receitas Totais</li>
            </ul>
        </nav>

        <main class="main-content">
            <header class="top-bar">
                <div class="header-left">
                    <button id="btn-toggle-sidebar" class="btn-menu"><span class="material-symbols-rounded">menu</span></button>
                    <div>
                        <h1>Gestão de Pacotes</h1>
                        <p>Crie e organize os combos de créditos para revenda.</p>
                    </div>
                </div>
            </header>

            <div class="table-container" style="margin-bottom: 30px;">
                <form id="form-pacotes" class="pkg-form-inline">
                    <div class="form-group">
                        <label>Nome do Pacote</label>
                        <input type="text" id="nome_pacote" class="form-control" placeholder="Ex: Pacote Iniciante" required>
                    </div>
                    <div class="form-group">
                        <label>Quantidade de Créditos</label>
                        <input type="number" id="creditos_pacote" class="form-control" placeholder="10" required>
                    </div>
                    <div class="form-group">
                        <label>Valor Total (R$)</label>
                        <input type="number" step="0.01" id="valor_pacote" class="form-control" placeholder="100.00" required>
                    </div>
                    <button type="submit" class="btn-add-shop">
                        <span class="material-symbols-rounded">add_shopping_cart</span> Salvar
                    </button>
                </form>
            </div>

            <div class="vitrine-section">
                <div class="vitrine-header">
                    <span class="material-symbols-rounded">grid_view</span>
                    <h3>Pacotes na Vitrine</h3>
                </div>
                <div class="pkg-grid" id="pkg-grid">
                    </div>
            </div>
        </main>
    </div>

    <script src="js/pacotes.js?v=1"></script>
</body>
</html>
