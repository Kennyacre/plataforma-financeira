<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registo - TN INFO</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="css/login.css?v=2">
</head>

<body>

    <div class="login-container wide">
        <div class="login-box">
            <div class="logo">TN INFO</div>
            <div class="subtitle">Crie sua conta para começar</div>

            <form id="formCadastro">
                <div class="form-grid">
                    <div class="form-group col-span-2">
                        <label>Nome Completo</label>
                        <div class="input-wrapper">
                            <span class="material-symbols-rounded">badge</span>
                            <input type="text" id="nome_completo" class="form-control" placeholder="Seu nome completo" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Utilizador (Username)</label>
                        <div class="input-wrapper">
                            <span class="material-symbols-rounded">person</span>
                            <input type="text" id="username" class="form-control" placeholder="Escolha um username" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>E-mail</label>
                        <div class="input-wrapper">
                            <span class="material-symbols-rounded">mail</span>
                            <input type="email" id="email" class="form-control" placeholder="seu@email.com" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Senha</label>
                        <div class="input-wrapper">
                            <span class="material-symbols-rounded">lock</span>
                            <input type="password" id="password" class="form-control" placeholder="Mínimo 6 caracteres" required minlength="6">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>ID de Indicação <span style="font-size: 10px; opacity: 0.5;">(Opcional)</span></label>
                        <div class="input-wrapper">
                            <span class="material-symbols-rounded">group</span>
                            <input type="number" id="id_indicacao" class="form-control" placeholder="Ex: 4">
                        </div>
                    </div>
                </div>

                <div id="mensagemStatus" class="error-msg"></div>

                <button type="submit" id="btn-submit-cadastro" class="btn-login">
                    <span>Concluir Registo</span>
                    <span class="material-symbols-rounded">app_registration</span>
                </button>

                <div class="register-section">
                    <p>Já possui uma conta? <a href="index.html">Faça login</a></p>
                </div>
            </form>
        </div>
    </div>

    <script src="js/cadastro.js?v=2"></script>
</body>

</html>
