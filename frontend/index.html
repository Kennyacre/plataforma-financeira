<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar | MTConnect</title>
    <link rel="shortcut icon" href="assets/img/logo.jpg" type="image/x-icon">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <style>
        :root {
            --primary: #ffffff;
            --primary-dark: #e4e4e7;
            --bg-dark: #09090b;
            --card-bg: #18181b;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --accent: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at center, rgba(255,255,255,0.03) 0%, transparent 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
        }

        .login-box {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .logo-container {
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-img {
            width: 120px;
            height: 120px;
            border-radius: 20px;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.1);
            margin-bottom: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .logo-text {
            font-family: 'Outfit', sans-serif;
            font-size: 28px;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 35px;
            font-weight: 400;
        }

        .form-group { text-align: left; margin-bottom: 24px; }
        .form-group label { display: block; margin-bottom: 10px; color: var(--text-muted); font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper .material-symbols-rounded {
            position: absolute;
            left: 14px;
            color: var(--text-muted);
            font-size: 20px;
        }

        .form-control {
            width: 100%;
            padding: 14px 14px 14px 46px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: #09090b;
            color: white;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.5);
            background: #000000;
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.05);
        }

        .error-msg {
            color: #ff4d4d;
            font-size: 13px;
            margin-bottom: 24px;
            display: none;
            justify-content: center;
            align-items: center;
            gap: 8px;
            background: rgba(255, 77, 77, 0.05);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(255, 77, 77, 0.1);
        }

        .btn-login {
            width: 100%;
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-login:hover {
            background: #e4e4e7;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.1);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .register-link { margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 20px; }
        .register-link p { color: var(--text-muted); font-size: 14px; }
        .register-link a { color: #ffffff; text-decoration: none; font-weight: 700; border-bottom: 1px solid rgba(255,255,255,0.2); transition: 0.3s; }
        .register-link a:hover { border-bottom-color: #ffffff; }
    </style>

    <!-- PWA Core -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/jpeg" href="assets/img/logo.jpg">
    <link rel="apple-touch-icon" href="assets/img/logo.jpg">
    <meta name="theme-color" content="#09090b">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- iOS Support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TN INFO">

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js', { scope: '/' })
                    .then(reg => console.log('SW: Ativo no scope:', reg.scope))
                    .catch(err => console.log('SW: Erro ao registar!', err));
            });
        }
    </script>
</head>

<body>

    <div class="login-box">
        <div class="logo-container">
            <img src="assets/img/logo.jpg" alt="TN INFO" class="logo-img">
            <div class="logo-text">TN INFO</div>
        </div>
        <div class="subtitle">Acesse seu painel financeiro de elite</div>

        <form id="formLogin">
            <div class="form-group">
                <label for="email">Utilizador ou E-mail</label>
                <div class="input-wrapper">
                    <span class="material-symbols-rounded">person</span>
                    <input type="text" id="email" class="form-control" placeholder="Seu e-mail" required>
                </div>
            </div>
            <div class="form-group">
                <label for="password">Senha</label>
                <div class="input-wrapper">
                    <span class="material-symbols-rounded">lock</span>
                    <input type="password" id="password" class="form-control" placeholder="Sua senha" required>
                </div>
            </div>

            <div id="mensagemErro" class="error-msg">
                <span class="material-symbols-rounded">error</span>
                <span id="error-text">E-mail ou senha incorretos!</span>
            </div>

            <button type="submit" id="btn-submit-login" class="btn-login">
                <span>Entrar</span>
                <span class="material-symbols-rounded">arrow_forward</span>
            </button>

            <div class="register-link">
                <p style="color: #94a3b8; font-size: 14px;">Não tem uma conta? <a href="cadastro.html">Registe-se aqui</a></p>
                <p style="margin-top: 10px; font-size: 13px;"><a href="recuperar-senha.html" style="color: #64748b; font-weight: 400; border-bottom: 1px dashed #64748b;">Esqueci minha senha</a></p>
            </div>
        </form>
    </div>


    <script src="js/login.js?v=1"></script>
</body>

</html>
