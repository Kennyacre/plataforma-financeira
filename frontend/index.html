<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TN INFO</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <style>
        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --bg-dark: #0f172a;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            background-image: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.7)), url('assets/img/login-bg.jpg');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
        }

        .login-box {
            background: rgba(30, 41, 59, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .logo {
            font-size: 32px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #cbd5e1; font-size: 14px; }

        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper .material-symbols-rounded {
            position: absolute;
            left: 12px;
            color: var(--text-muted);
            font-size: 20px;
        }

        .form-control {
            width: 100%;
            padding: 12px 12px 12px 42px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: #0f172a;
            color: white;
            font-size: 15px;
        }

        .error-msg {
            color: #ef4444;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            justify-content: center;
            align-items: center;
            gap: 5px;
            background: rgba(239, 68, 68, 0.1);
            padding: 10px;
            border-radius: 8px;
        }

        .btn-login {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .register-link { margin-top: 25px; }
        .register-link a { color: var(--primary); text-decoration: none; font-weight: 600; }
    </style>

    <!-- PWA Core -->
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" href="/static/icon-512.png">
    <link rel="apple-touch-icon" href="/static/icon-512.png">
    <meta name="theme-color" content="#0f172a">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- iOS Support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MTConnect">

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js', { scope: '/' })
                    .then(reg => console.log('SW: Ativo no scope:', reg.scope))
                    .catch(err => console.log('SW: Erro ao registar!', err));
            });
        }
    </script>
</head>

<body>

    <div class="login-box">
        <div class="logo">TN INFO</div>
        <div class="subtitle">Acesse seu painel financeiro</div>

        <form id="formLogin">
            <div class="form-group">
                <label for="email">Utilizador ou E-mail</label>
                <div class="input-wrapper">
                    <span class="material-symbols-rounded">person</span>
                    <input type="text" id="email" class="form-control" placeholder="Seu e-mail" required>
                </div>
            </div>
            <div class="form-group">
                <label for="password">Senha</label>
                <div class="input-wrapper">
                    <span class="material-symbols-rounded">lock</span>
                    <input type="password" id="password" class="form-control" placeholder="Sua senha" required>
                </div>
            </div>

            <div id="mensagemErro" class="error-msg">
                <span class="material-symbols-rounded">error</span>
                <span id="error-text">E-mail ou senha incorretos!</span>
            </div>

            <button type="submit" id="btn-submit-login" class="btn-login">
                <span>Entrar</span>
                <span class="material-symbols-rounded">arrow_forward</span>
            </button>

            <div class="register-link">
                <p style="color: #94a3b8; font-size: 14px;">Não tem uma conta? <a href="cadastro.html">Registe-se aqui</a></p>
            </div>
        </form>
    </div>


    <script src="js/login.js?v=1"></script>
</body>

</html>
