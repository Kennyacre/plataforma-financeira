version: '3.8'

services:
  db_postgres:
    image: postgres:15-alpine
    container_name: db_postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  mtconnect_app:
    build: .
    container_name: mtconnect_app
    restart: unless-stopped
    env_file: .env
    depends_on:
      - db_postgres
    volumes:
      - .:/app
    ports:
      - "8501:8251"
    command: uvicorn main:app --host 0.0.0.0 --port 8251 --reload

  evolution_api:
    image: atendai/evolution-api:v1.8.2
    container_name: evolution_api
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://192.168.29.221:8080
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=TNINFO_MASTER_KEY_123
      - AUTHENTICATION_EXPOSE_IN_ENV=true
    volumes:
      - ./instances:/evolution/instances
